version: '1.0'
name: quant-signal-scan
display-name: '量化信号扫描'
triggers:
  push:
    branches:
      - master
  schedule:
    - cron: '7 1 * * 1-5'
    - cron: '37 1 * * 1-5'
    - cron: '7 2 * * 1-5'
    - cron: '37 2 * * 1-5'
    - cron: '7 3 * * 1-5'
    - cron: '37 3 * * 1-5'
    - cron: '7 4 * * 1-5'
    - cron: '37 4 * * 1-5'
    - cron: '7 5 * * 1-5'
    - cron: '37 5 * * 1-5'
    - cron: '7 6 * * 1-5'
    - cron: '37 6 * * 1-5'
    - cron: '7 7 * * 1-5'
    - cron: '37 7 * * 1-5'

stages:
  - stage: scan
    display-name: '扫描信号'
    jobs:
      - job: scan
        display-name: '扫描并推送'
        steps:
          - step: checkout@v1
            display-name: '拉取代码'
          - step: shell@v1
            display-name: '安装依赖'
            inputs:
              script: |
                pip install pandas numpy requests baostock -q
          - step: shell@v1
            display-name: '执行扫描'
            inputs:
              script: |
                export PUSHPLUS_TOKEN=f3fb5c092ba34785b6857bb45d23d4fa
                python cloud_function.py
